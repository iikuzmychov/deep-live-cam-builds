name: Build Deep-Live-Cam

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      datetime: ${{ steps.check.outputs.datetime }}
      tag: ${{ steps.check.outputs.tag }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/hacksider/Deep-Live-Cam.git HEAD | cut -f1)
          SHORT_SHA=${UPSTREAM_SHA:0:7}
          DATETIME=$(date +%Y-%m-%d-%H%M)
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "datetime=${DATETIME}" >> "$GITHUB_OUTPUT"
          echo "tag=build-${SHORT_SHA}-${DATETIME}" >> "$GITHUB_OUTPUT"

          if gh release list --repo ${{ github.repository }} --json tagName -q '.[].tagName' | grep -q "$SHORT_SHA"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release for $SHORT_SHA already exists, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No release for $SHORT_SHA, building."
          fi

  build:
    needs: check
    if: needs.check.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: directml
            os: windows-latest
            onnxruntime: onnxruntime-directml
            provider: dml
          - name: cuda
            os: windows-latest
            onnxruntime: onnxruntime-gpu
            provider: cuda
          - name: openvino
            os: windows-latest
            onnxruntime: onnxruntime-openvino
            provider: openvino
          - name: coreml
            os: macos-latest
            onnxruntime: onnxruntime-silicon
            provider: coreml
    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone upstream
        shell: bash
        run: git clone https://github.com/hacksider/Deep-Live-Cam.git upstream

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'upstream/requirements.txt'

      - name: Install dependencies
        shell: bash
        run: |
          cd upstream
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y torch torchvision torchaudio onnxruntime onnxruntime-gpu onnxruntime-silicon 2>/dev/null || true
          pip install ${{ matrix.onnxruntime }}
          pip install pyinstaller

      - name: Download models
        shell: bash
        run: |
          cd upstream
          curl -L -o models/inswapper_128_fp16.onnx "https://huggingface.co/hacksider/deep-live-cam/resolve/main/inswapper_128_fp16.onnx?download=true"
          cp models/inswapper_128_fp16.onnx models/inswapper_128.onnx
          curl -L -o models/GFPGANv1.4.pth "https://github.com/TencentARC/GFPGAN/releases/download/v1.3.4/GFPGANv1.4.pth"

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          7z x ffmpeg.zip -offmpeg_tmp
          mkdir -p upstream/ffmpeg
          cp ffmpeg_tmp/ffmpeg-*/bin/ffmpeg.exe upstream/ffmpeg/
          cp ffmpeg_tmp/ffmpeg-*/bin/ffprobe.exe upstream/ffmpeg/

      - name: Download FFmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip ffmpeg.zip -d upstream/ffmpeg
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip ffprobe.zip -d upstream/ffmpeg

      - name: Build with PyInstaller
        shell: bash
        run: |
          cd upstream
          cat > deep-live-cam.spec << 'SPECEOF'
          # -*- mode: python ; coding: utf-8 -*-
          import sys
          from PyInstaller.utils.hooks import collect_data_files, collect_dynamic_libs, collect_submodules

          datas = [
              ('models', 'models'),
              ('modules/ui.json', 'modules'),
              ('locales', 'locales'),
              ('tkinter_fix.py', '.'),
          ]
          datas += collect_data_files('customtkinter')
          datas += collect_data_files('onnxruntime')
          datas += collect_data_files('insightface')
          if sys.platform != 'darwin':
              datas += collect_data_files('tensorflow')
          datas += collect_data_files('opennsfw2')

          binaries = collect_dynamic_libs('onnxruntime')
          binaries += collect_dynamic_libs('cv2')

          hiddenimports = [
              'tkinter', 'tkinter_fix', 'customtkinter',
              'PIL', 'PIL.Image', 'cv2', 'numpy',
              'onnx', 'onnxruntime', 'onnxruntime.capi',
              'insightface', 'insightface.app', 'insightface.model_zoo',
              'opennsfw2',
              'cv2_enumerate_cameras', 'psutil',
              'protobuf', 'google.protobuf',
              'scipy', 'sklearn', 'skimage', 'albumentations',
          ]
          if sys.platform != 'darwin':
              hiddenimports += ['tensorflow', 'pygrabber', 'pygrabber.dshow_graph']
          hiddenimports += collect_submodules('insightface')
          hiddenimports += collect_submodules('onnxruntime')
          hiddenimports += collect_submodules('modules')
          hiddenimports += collect_submodules('modules.processors')

          a = Analysis(
              ['run.py'],
              pathex=['.'],
              binaries=binaries,
              datas=datas,
              hiddenimports=hiddenimports,
              hookspath=[], hooksconfig={}, runtime_hooks=[],
              excludes=[], win_no_prefer_redirects=False,
              win_private_assemblies=False, cipher=None, noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=None)
          exe = EXE(
              pyz, a.scripts, [], exclude_binaries=True,
              name='DeepLiveCam', debug=False, bootloader_ignore_signals=False,
              strip=False, upx=False, console=True, icon=None
          )
          coll = COLLECT(
              exe, a.binaries, a.zipfiles, a.datas,
              strip=False, upx=False, name='DeepLiveCam'
          )
          SPECEOF
          pyinstaller deep-live-cam.spec --noconfirm

      - name: Create release archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd upstream/dist
          cp ../ffmpeg/ffmpeg.exe DeepLiveCam/
          cp ../ffmpeg/ffprobe.exe DeepLiveCam/
          if [ "${{ matrix.name }}" = "cuda" ]; then
            cat > DeepLiveCam/DeepLiveCam.bat << 'BATEOF'
          @echo off
          set "CUDA_DIR="
          for /d %%D in ("C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.*") do set "CUDA_DIR=%%D"
          if not defined CUDA_DIR (
            echo [ERROR] CUDA 12 is not installed.
            echo Download it from: https://developer.nvidia.com/cuda-12-6-0-download-archive
            echo.
            pause
            exit /b 1
          )
          set "CUDNN_DIR="
          for /d %%D in ("C:\Program Files\NVIDIA\CUDNN\v9.*") do set "CUDNN_DIR=%%D"
          if not defined CUDNN_DIR (
            echo [ERROR] cuDNN 9 is not installed.
            echo Download it from: https://developer.nvidia.com/cudnn-downloads
            echo.
            pause
            exit /b 1
          )
          for /d %%A in ("%CUDNN_DIR%\bin\12.*") do for /d %%X in ("%%A\*") do set "CUDNN_BIN=%%X"
          set PATH=%CUDA_DIR%\bin;%CUDNN_BIN%;%~dp0;%PATH%
          "%~dp0DeepLiveCam.exe" --execution-provider cuda %*
          pause
          BATEOF
          else
            cat > DeepLiveCam/DeepLiveCam.bat << BATEOF
          @echo off
          set PATH=%~dp0;%PATH%
          start "" "%~dp0DeepLiveCam.exe" --execution-provider ${{ matrix.provider }} %*
          BATEOF
          fi
          7z a -mx1 ../../DeepLiveCam-windows-${{ matrix.name }}.zip DeepLiveCam/

      - name: Create release archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd upstream/dist
          cp ../ffmpeg/ffmpeg DeepLiveCam/
          cp ../ffmpeg/ffprobe DeepLiveCam/
          cat > DeepLiveCam/DeepLiveCam.command << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          "$DIR/DeepLiveCam" --execution-provider coreml "$@"
          SHEOF
          chmod +x DeepLiveCam/DeepLiveCam.command DeepLiveCam/DeepLiveCam
          cd DeepLiveCam && zip -r ../../../DeepLiveCam-macos-coreml.zip . && cd ..

      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: DeepLiveCam-*-${{ matrix.name }}.zip

  release:
    needs: [check, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download all builds
        uses: actions/download-artifact@v4

      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md << 'NOTES'
          Built from [hacksider/Deep-Live-Cam](https://github.com/hacksider/Deep-Live-Cam) @ [`${{ needs.check.outputs.short_sha }}`](https://github.com/hacksider/Deep-Live-Cam/commit/${{ needs.check.outputs.upstream_sha }})

          ### Which build should I download?

          | Platform | Build | GPU | Dependencies | Recommended for |
          |----------|-------|-----|--------------|-----------------|
          | Windows | **directml** | Any GPU (NVIDIA / AMD / Intel) | None | Most Windows users |
          | Windows | **cuda** | NVIDIA RTX 2000+ | [CUDA 12](https://developer.nvidia.com/cuda-12-6-0-download-archive) + [cuDNN 9](https://developer.nvidia.com/cudnn-downloads) | Best performance on modern NVIDIA |
          | Windows | **openvino** | Intel only | None | Best performance on Intel |
          | macOS | **coreml** | Apple Silicon | None | Mac M1+ users |

          > **Windows** — not sure? Go with **directml**. It works on any GPU with no extra setup.

          If your GPU isn't supported or unavailable, the app automatically falls back to CPU.

          ### Usage

          **Windows:** Extract the zip, run `DeepLiveCam.bat`.

          **macOS:** Extract the zip, run `DeepLiveCam.command`.
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.check.outputs.tag }}" \
            directml/DeepLiveCam-windows-directml.zip \
            cuda/DeepLiveCam-windows-cuda.zip \
            openvino/DeepLiveCam-windows-openvino.zip \
            coreml/DeepLiveCam-macos-coreml.zip \
            --repo ${{ github.repository }} \
            --title "Deep-Live-Cam ${{ needs.check.outputs.datetime }} (${{ needs.check.outputs.short_sha }})" \
            --notes-file release-notes.md
