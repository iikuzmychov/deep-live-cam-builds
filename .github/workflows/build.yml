name: Build Deep-Live-Cam

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      repository:
        description: 'Repository to build (owner/name)'
        type: string
        default: 'hacksider/Deep-Live-Cam'
      ref:
        description: 'Git ref to build (branch, tag, or commit SHA)'
        type: string
        default: ''
      publish:
        description: 'Publish the release after building'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      repo: ${{ steps.check.outputs.repo }}
      upstream_sha: ${{ steps.check.outputs.upstream_sha }}
      short_sha: ${{ steps.check.outputs.short_sha }}
      datetime: ${{ steps.check.outputs.datetime }}
      tag: ${{ steps.check.outputs.tag }}
      title: ${{ steps.check.outputs.title }}
    steps:
      - name: Check for new upstream release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ inputs.repository || 'hacksider/Deep-Live-Cam' }}"
          REF="${{ inputs.ref }}"
          echo "repo=${REPO}" >> "$GITHUB_OUTPUT"
          if [ -n "$REF" ]; then
            UPSTREAM_SHA=$(git ls-remote "https://github.com/${REPO}.git" "$REF" | head -1 | cut -f1)
            if [ -z "$UPSTREAM_SHA" ]; then
              # ref might be a full commit SHA
              UPSTREAM_SHA="$REF"
            fi
          else
            UPSTREAM_SHA=$(git ls-remote "https://github.com/${REPO}.git" HEAD | cut -f1)
          fi
          SHORT_SHA=${UPSTREAM_SHA:0:7}
          DATETIME=$(date +%Y-%m-%d-%H%M)
          echo "upstream_sha=${UPSTREAM_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "datetime=${DATETIME}" >> "$GITHUB_OUTPUT"
          if [ "$REPO" = "hacksider/Deep-Live-Cam" ]; then
            TAG_PREFIX="build-${SHORT_SHA}"
            echo "tag=build-${SHORT_SHA}-${DATETIME}" >> "$GITHUB_OUTPUT"
            echo "title=Deep-Live-Cam ${DATETIME} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          else
            TAG_PREFIX="build-${REPO}-${SHORT_SHA}"
            echo "tag=build-${REPO}-${SHORT_SHA}-${DATETIME}" >> "$GITHUB_OUTPUT"
            echo "title=Deep-Live-Cam ${DATETIME} (${REPO}/${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Manual trigger, forcing build."
          elif gh release list --repo ${{ github.repository }} --json tagName -q '.[].tagName' | grep -q "^${TAG_PREFIX}"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Release for ${TAG_PREFIX} already exists, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No release for ${TAG_PREFIX}, building."
          fi

  create-release:
    needs: check
    if: needs.check.outputs.skip == 'false'
    runs-on: ubuntu-latest
    steps:
      - name: Create release notes
        shell: bash
        run: |
          cat > release-notes.md << 'NOTES'
          Built from [${{ needs.check.outputs.repo }}](https://github.com/${{ needs.check.outputs.repo }}) @ [`${{ needs.check.outputs.short_sha }}`](https://github.com/${{ needs.check.outputs.repo }}/commit/${{ needs.check.outputs.upstream_sha }})

          ### Which build should I download?

          | Platform | Build | GPU | Dependencies | Recommended for |
          |----------|-------|-----|--------------|-----------------|
          | Windows | **directml** | Any | None | Most Windows users |
          | Windows | **cuda** | NVIDIA | [CUDA 12](https://developer.nvidia.com/cuda-12-6-0-download-archive) + [cuDNN 9](https://developer.nvidia.com/cudnn-downloads) | Best performance on modern NVIDIA GPU |
          | Windows | **openvino** | Intel | None | Best performance on modern Intel GPU |
          | macOS | **coreml** | Apple Silicon | None | Mac M1+ users |

          > **Windows** — not sure? Go with **directml**. It works on any GPU with no extra setup.

          If your GPU isn't supported or unavailable, the app automatically falls back to CPU.

          ### Usage

          **Windows:** Extract the zip, run `DeepLiveCam.bat`.

          **macOS:** Extract the zip, double-click `DeepLiveCam.command` — macOS will block it the first time. Go to **System Settings → Privacy & Security**, scroll down and click **Open Anyway**.

          > **Note:** The first time you click **Live**, macOS will ask for camera access. Approve it, then click **Live** again.
          >
          > The first launch on macOS can take around 2 minutes. This is expected; later launches should be much faster.
          NOTES

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.check.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --title "${{ needs.check.outputs.title }}" \
            --notes-file release-notes.md \
            --draft

  build:
    needs: [check, create-release]
    if: needs.check.outputs.skip == 'false'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: directml
            os: windows-latest
            onnxruntime: onnxruntime-directml
            provider: dml
          - name: cuda
            os: windows-latest
            onnxruntime: onnxruntime-gpu
            provider: cuda
          - name: openvino
            os: windows-latest
            onnxruntime: onnxruntime-openvino
            provider: openvino
          - name: coreml
            os: macos-latest
            onnxruntime: onnxruntime-silicon
            provider: coreml
    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone upstream
        shell: bash
        run: |
          git clone "https://github.com/${{ needs.check.outputs.repo }}.git" upstream
          cd upstream
          git checkout "${{ needs.check.outputs.upstream_sha }}"

      - name: Patch upstream for PyInstaller compatibility
        shell: bash
        run: |
          cd upstream
          python -c "
          import pathlib, sys
          p = pathlib.Path('modules/core.py')
          text = p.read_text()
          text = text.replace('if to_quit: quit()', 'if to_quit: sys.exit()')
          p.write_text(text)
          "

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'upstream/requirements.txt'

      - name: Install dependencies
        shell: bash
        run: |
          cd upstream
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip uninstall -y torch torchvision torchaudio onnxruntime onnxruntime-gpu onnxruntime-silicon 2>/dev/null || true
          if [ "$RUNNER_OS" = "macOS" ]; then
            pip uninstall -y tensorflow 2>/dev/null || true
          fi
          pip install ${{ matrix.onnxruntime }}
          pip install pyinstaller

      - name: Download models
        shell: bash
        run: |
          cd upstream
          curl -L -o models/inswapper_128_fp16.onnx "https://huggingface.co/hacksider/deep-live-cam/resolve/main/inswapper_128_fp16.onnx?download=true"
          cp models/inswapper_128_fp16.onnx models/inswapper_128.onnx
          curl -L -o models/gfpgan-1024.onnx "https://huggingface.co/hacksider/deep-live-cam/resolve/main/gfpgan-1024.onnx?download=true"
          curl -L -o models/GPEN-BFR-256.onnx "https://huggingface.co/hacksider/deep-live-cam/resolve/main/GPEN-BFR-256.onnx?download=true"
          curl -L -o models/GPEN-BFR-512.onnx "https://huggingface.co/hacksider/deep-live-cam/resolve/main/GPEN-BFR-512.onnx?download=true"

      - name: Download FFmpeg (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          7z x ffmpeg.zip -offmpeg_tmp
          mkdir -p upstream/ffmpeg
          cp ffmpeg_tmp/ffmpeg-*/bin/ffmpeg.exe upstream/ffmpeg/
          cp ffmpeg_tmp/ffmpeg-*/bin/ffprobe.exe upstream/ffmpeg/

      - name: Download FFmpeg (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          curl -L -o ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip ffmpeg.zip -d upstream/ffmpeg
          curl -L -o ffprobe.zip "https://evermeet.cx/ffmpeg/getrelease/ffprobe/zip"
          unzip ffprobe.zip -d upstream/ffmpeg

      - name: Build with PyInstaller
        shell: bash
        run: |
          cd upstream
          cat > deep-live-cam.spec << 'SPECEOF'
          # -*- mode: python ; coding: utf-8 -*-
          import sys
          from PyInstaller.utils.hooks import collect_data_files, collect_dynamic_libs, collect_submodules

          datas = [
              ('models', 'models'),
              ('modules/ui.json', 'modules'),
              ('locales', 'locales'),
              ('tkinter_fix.py', '.'),
          ]
          datas += collect_data_files('customtkinter')
          datas += collect_data_files('onnxruntime')
          datas += collect_data_files('insightface')
          if sys.platform != 'darwin':
              datas += collect_data_files('tensorflow')
          datas += collect_data_files('opennsfw2')

          binaries = collect_dynamic_libs('onnxruntime')
          binaries += collect_dynamic_libs('cv2')

          hiddenimports = [
              'tkinter', 'tkinter_fix', 'customtkinter',
              'PIL', 'PIL.Image', 'cv2', 'numpy',
              'onnx', 'onnxruntime', 'onnxruntime.capi',
              'insightface', 'insightface.app', 'insightface.model_zoo',
              'opennsfw2',
              'cv2_enumerate_cameras', 'psutil',
              'protobuf', 'google.protobuf',
              'scipy', 'sklearn', 'skimage', 'albumentations',
          ]
          if sys.platform != 'darwin':
              hiddenimports += ['tensorflow', 'pygrabber', 'pygrabber.dshow_graph']
          hiddenimports += collect_submodules('insightface')
          hiddenimports += collect_submodules('onnxruntime')
          # collect_submodules doesn't work for local source packages,
          # so we discover them by scanning .py files on disk
          import glob as _glob
          for py_file in _glob.glob('modules/**/*.py', recursive=True):
              mod = py_file.replace('\\', '/').replace('/', '.').removesuffix('.py')
              if mod.endswith('.__init__'):
                  mod = mod.removesuffix('.__init__')
              hiddenimports.append(mod)
          print("Collected local modules:")
          for h in sorted(set(h for h in hiddenimports if h.startswith('modules'))):
              print(f"  {h}")

          a = Analysis(
              ['run.py'],
              pathex=['.'],
              binaries=binaries,
              datas=datas,
              hiddenimports=hiddenimports,
              hookspath=[], hooksconfig={}, runtime_hooks=[],
              excludes=['tensorflow'] if sys.platform == 'darwin' else [],
              win_no_prefer_redirects=False,
              win_private_assemblies=False, cipher=None, noarchive=False,
          )
          pyz = PYZ(a.pure, a.zipped_data, cipher=None)
          exe = EXE(
              pyz, a.scripts, [], exclude_binaries=True,
              name='DeepLiveCam', debug=False, bootloader_ignore_signals=False,
              strip=False, upx=False, console=True, icon=None
          )
          coll = COLLECT(
              exe, a.binaries, a.zipfiles, a.datas,
              strip=False, upx=False, name='DeepLiveCam'
          )
          SPECEOF
          pyinstaller deep-live-cam.spec --noconfirm

      - name: Create release archive (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd upstream/dist
          cp ../ffmpeg/ffmpeg.exe DeepLiveCam/
          cp ../ffmpeg/ffprobe.exe DeepLiveCam/
          if [ "${{ matrix.name }}" = "cuda" ]; then
            cat > DeepLiveCam/DeepLiveCam.bat << 'BATEOF'
          @echo off
          set "CUDA_DIR="
          for /d %%D in ("C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.*") do set "CUDA_DIR=%%D"
          if not defined CUDA_DIR (
            echo [ERROR] CUDA 12 is not installed.
            echo Download it from: https://developer.nvidia.com/cuda-12-6-0-download-archive
            echo.
            pause
            exit /b 1
          )
          set "CUDNN_DIR="
          for /d %%D in ("C:\Program Files\NVIDIA\CUDNN\v9.*") do set "CUDNN_DIR=%%D"
          if not defined CUDNN_DIR (
            echo [ERROR] cuDNN 9 is not installed.
            echo Download it from: https://developer.nvidia.com/cudnn-downloads
            echo.
            pause
            exit /b 1
          )
          for /d %%A in ("%CUDNN_DIR%\bin\12.*") do for /d %%X in ("%%A\*") do set "CUDNN_BIN=%%X"
          set PATH=%CUDA_DIR%\bin;%CUDNN_BIN%;%~dp0;%PATH%
          "%~dp0DeepLiveCam.exe" --execution-provider cuda %*
          pause
          BATEOF
          else
            cat > DeepLiveCam/DeepLiveCam.bat << BATEOF
          @echo off
          set PATH=%~dp0;%PATH%
          start "" "%~dp0DeepLiveCam.exe" --execution-provider ${{ matrix.provider }} %*
          BATEOF
          fi
          7z a -mx1 ../../DeepLiveCam-windows-${{ matrix.name }}.zip DeepLiveCam/

      - name: Create release archive (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd upstream/dist
          cp ../ffmpeg/ffmpeg DeepLiveCam/
          cp ../ffmpeg/ffprobe DeepLiveCam/
          cat > DeepLiveCam/DeepLiveCam.command << 'SHEOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          xattr -cr "$DIR"
          export PATH="$DIR:$PATH"
          "$DIR/DeepLiveCam" --execution-provider coreml "$@"
          SHEOF
          chmod +x DeepLiveCam/DeepLiveCam.command DeepLiveCam/DeepLiveCam
          cd DeepLiveCam && zip -r ../../../DeepLiveCam-macos-coreml.zip . && cd ..

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          cd upstream/dist/DeepLiveCam
          export PATH="$(pwd):$PATH"
          timeout 30 ./DeepLiveCam.exe --execution-provider ${{ matrix.provider }} || code=$?
          if [ "${code:-0}" -eq 124 ]; then
            echo "Smoke test passed (app started and was killed after timeout)"
          else
            echo "Smoke test FAILED with exit code ${code}"
            exit 1
          fi

      - name: Smoke test (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          cd upstream/dist/DeepLiveCam
          brew install coreutils
          xattr -cr .
          export PATH="$(pwd):$PATH"
          gtimeout 60 ./DeepLiveCam --execution-provider ${{ matrix.provider }} || code=$?
          if [ "${code:-0}" -eq 124 ]; then
            echo "Smoke test passed (app started and was killed after timeout)"
          else
            echo "Smoke test FAILED with exit code ${code}"
            exit 1
          fi

      - name: Upload to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload "${{ needs.check.outputs.tag }}" \
            DeepLiveCam-*-${{ matrix.name }}.zip \
            --repo ${{ github.repository }}

  publish-release:
    needs: [check, build]
    if: needs.check.outputs.skip == 'false' && (github.event_name != 'workflow_dispatch' || inputs.publish)
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.check.outputs.tag }}" \
            --repo ${{ github.repository }} \
            --draft=false \
            --latest
